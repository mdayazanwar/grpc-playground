syntax = "proto3";

package sec03;
option java_multiple_files = true;
option java_package = "com.ayaz.models.sec03";

enum  BodyStyle {
  UNKNOWN = 0; // it start with 0 and it is used as default value
  SEDAN=1;
  COUPE=2;
  SUV=3;
}

message  Car {

  string make = 1;
  string model = 2;
  int32 year = 3;
  BodyStyle body_style = 4;
}

message Dealer {

  map<int32, Car> inventory = 1;
}